name: Bug
description: Report a defect using synthetic data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide steps using synthetic data only.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: This report contains no real personal data, business records, credentials, or private notes.
          required: true

