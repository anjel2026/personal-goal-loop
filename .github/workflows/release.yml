name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release-artifacts:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Release preflight
        shell: pwsh
        run: .\scripts\release-preflight.ps1 -SkipInstall -KeepArtifacts
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: personal-goal-loop-release-artifacts
          path: |
            dist/*
            .tmp/synthetic_timecard_anonymized.anonymize-report.json
